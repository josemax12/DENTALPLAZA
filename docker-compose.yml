version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: odonto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-odontologia}
      POSTGRES_USER: ${DB_USER:-odonto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odonto_pass_2026}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-odonto_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: odonto_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: odonto_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

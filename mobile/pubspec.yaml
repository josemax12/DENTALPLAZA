name: odonto_sync
description: Aplicación dental integral con soporte offline para pacientes y doctores.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Navegación y Estado
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  
  # Red y Datos
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  
  # Utilidades
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  loading_animation_widget: ^1.2.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
